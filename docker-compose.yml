# Do not edit this file directly. Use a ‘docker-compose.override.yaml’ file if you can.
# Refer to `docker-compose.override.yaml.example’ for some sample configurations.

services:
  api:
    container_name: LibreChat
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - mongodb
      - rag_api
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    restart: always
    user: "${UID}:${GID}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - OPENAI_API_BASE_URL=http://host.docker.internal:4000/v1
      - OPENAI_API_KEY=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
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./skill:/app/skill
  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    user: "${UID}:${GID}"
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    user: "${UID}:${GID}"
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data_v1.35.1:/meili_data
  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
  rag_api:
    container_name: rag_api
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-proxy
    restart: always
    depends_on:
      - postgres
    ports:
      - "4000:4000"

    environment:
      DATABASE_URL: postgresql://litellm:litellm123@postgres:5432/litellm

      OPENAI_API_BASE_URL=: http://host.docker.internal:4000/v1
      OPENAI_API_KEY: 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

      # IMPORTANT: tells LiteLLM to use DB mode
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml  

    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
  postgres:
    image: postgres:15
    container_name: litellm-postgres
    restart: always
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm123
      POSTGRES_DB: litellm
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
    - ollama_data:/root/.ollama   
    
volumes:
  pgdata2:
  postgres_data:
  ollama_data: